name: Build & Package Extensions

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build open-lyrics
        run: |
          mkdir -p open-lyrics/dist
          cp open-lyrics/src/index.js open-lyrics/dist/index.js
          cp open-lyrics/manifest.json open-lyrics/dist/manifest.json
          cd open-lyrics/dist
          zip -j open-lyrics.spotiflac-ext manifest.json index.js

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-lyrics
          path: open-lyrics/dist/open-lyrics.spotiflac-ext
