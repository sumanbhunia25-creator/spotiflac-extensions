name: Build & Package Extensions

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build all extensions
        run: |
          for dir in odesli-enricher open-lyrics free-music-search soundcloud-provider; do
            if [ -d "$dir" ]; then
              cd $dir
              npm install
              npm run build
              npm run package
              cd ..
            else
              echo "Skipping $dir — folder not found"
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spotiflac-extensions
          path: "**/*.spotiflac-ext"
