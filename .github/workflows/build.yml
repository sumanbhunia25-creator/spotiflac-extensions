name: Build & Package Extensions

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build open-lyrics
        run: |
          cd open-lyrics
          npm install
          npm run build
          cd ..

      - name: Package extension
        run: |
          cd open-lyrics/dist
          zip -j open-lyrics.spotiflac-ext manifest.json index.js
          cd ../..
          mkdir -p dist
          cp open-lyrics/dist/open-lyrics.spotiflac-ext dist/

      - name: Delete old release
        run: |
          gh release delete v1.0.0 --yes || true
          git push origin :refs/tags/v1.0.0 || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0
          files: dist/open-lyrics.spotiflac-ext
          token: ${{ secrets.GITHUB_TOKEN }}
