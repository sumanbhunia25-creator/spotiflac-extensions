name: Build & Package Extensions

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build open-lyrics
        run: |
          cd open-lyrics
          npm install
          npm run build
          cd ..

      - name: Package extension
        run: |
          mkdir -p dist
          cp open-lyrics/dist/open-lyrics.spotiflac-ext dist/ 2>/dev/null || \
          zip -j dist/open-lyrics.spotiflac-ext open-lyrics/dist/*

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0
          files: dist/open-lyrics.spotiflac-ext
          token: ${{ secrets.GITHUB_TOKEN }}
